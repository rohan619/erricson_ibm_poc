name: CI - Tests, SonarQube, Fortify, BinAuthz

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q

  sonar:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  fortify:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Fortify
        run: chmod +x ./fortify_scan.sh
      - name: Run Fortify SCA
        env:
          FORTIFY_SCA_IMAGE: ${{ secrets.FORTIFY_SCA_IMAGE }}
        run: ./fortify_scan.sh

  build-image:
    runs-on: ubuntu-latest
    needs: [sonar, fortify]
    permissions:
      contents: read
      id-token: write
    outputs: # 👈 ADD THIS: Makes the digest available to other jobs
      image_digest: ${{ steps.get_digest.outputs.DIGEST }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Start Cloud Build
        run: |
          BUILD_ID=$(gcloud builds submit \
            --async \
            --tag ${{ secrets.ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/app-image:${{ github.sha }} \
            --format="value(id)")
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV

      - name: Wait for Cloud Build completion
        run: |
          STATUS="WORKING"
          while [[ "$STATUS" == "WORKING" || "$STATUS" == "QUEUED" ]]; do
            STATUS=$(gcloud builds describe $BUILD_ID --format="value(status)")
            echo "Current build status: $STATUS"
            sleep 10
          done
          if [[ "$STATUS" != "SUCCESS" ]]; then exit 1; fi

      - name: Get image digest
        id: get_digest # 👈 ADD THIS ID
        run: |
          DIGEST=$(gcloud artifacts docker images list \
          ${{ secrets.ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/app-image \
          --format="value(DIGEST)" \
          --filter="tags:${{ github.sha }}" | head -n 1)
          echo "DIGEST=$DIGEST" >> $GITHUB_OUTPUT # 👈 SAVE TO OUTPUT

  sign-image: # 👈 NEW JOB
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      contents: read
      id-token: write
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Beta Component
        run: gcloud components install beta --quiet

      - name: Sign and Create Attestation
        run: |
          gcloud beta container binauthz attestations sign-and-create \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --artifact-url="${{ secrets.ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/app-image@${{ needs.build-image.outputs.image_digest }}" \
            --attestor="my-attestor" \
            --attestor-project="${{ secrets.GCP_PROJECT_ID }}" \
            --keyversion-project="${{ secrets.GCP_PROJECT_ID }}" \
            --keyversion-location="global" \
            --keyversion-keyring="mytestring" \
            --keyversion-key="asymmetric-key" \
            --keyversion="1"
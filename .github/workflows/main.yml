name: CI - Tests, SonarQube, Fortify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -q

      # Gemini Code Assist step
      - name: Run Gemini Code Assist
        uses: google-github-actions/run-gemini-cli@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}


  sonar:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  fortify:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Fortify
        run: |
          chmod +x ./fortify_scan.sh

      - name: Run Fortify SCA
        env:
          FORTIFY_SCA_IMAGE: ${{ secrets.FORTIFY_SCA_IMAGE }}
        run: |
          ./fortify_scan.sh
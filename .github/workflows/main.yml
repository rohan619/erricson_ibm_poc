name: CI - Tests, SonarQube, Fortify, BinAuthz

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: my-gke-runners
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt
      - name: Run Tests
        env:
          PYTHONPATH: . # This dot means "Look in the current root folder!"
        run: pytest -q

  sonar:
    runs-on: my-gke-runners
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  fortify:
    runs-on: my-gke-runners
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Fortify
        run: chmod +x ./fortify_scan.sh
      - name: Run Fortify SCA
        env:
          FORTIFY_SCA_IMAGE: ${{ secrets.FORTIFY_SCA_IMAGE }}
        run: ./fortify_scan.sh

  build-image:
    runs-on: my-gke-runners
    needs: [sonar, fortify]
    permissions:
      contents: read
      id-token: write
    outputs:
      image_digest: ${{ steps.get_digest.outputs.DIGEST }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Start Cloud Build
        run: |
          BUILD_ID=$(gcloud builds submit \
            --async \
            --tag ${{ secrets.ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/app-image:${{ github.sha }} \
            --format="value(id)")
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV

      - name: Wait for Cloud Build completion
        run: |
          STATUS="WORKING"
          while [[ "$STATUS" == "WORKING" || "$STATUS" == "QUEUED" ]]; do
            STATUS=$(gcloud builds describe $BUILD_ID --format="value(status)")
            echo "Current build status: $STATUS"
            sleep 10
          done
          if [[ "$STATUS" != "SUCCESS" ]]; then exit 1; fi

      - name: Get image digest
        id: get_digest
        run: |
          # The exact image path and tag we just built
          IMAGE_PATH="${{ secrets.ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/app-image:${{ github.sha }}"
          
          echo "Fetching digest directly for exact tag: $IMAGE_PATH"
          
          # Use 'describe' instead of 'list' to target the exact tag. No sleep needed!
          DIGEST=$(gcloud artifacts docker images describe $IMAGE_PATH \
            --format="value(image_summary.digest)")
          
          if [ -z "$DIGEST" ]; then
            echo "ERROR: Cannot find the image digest for the pushed tag!"
            exit 1
          fi
          
          echo "DIGEST=$DIGEST" >> $GITHUB_OUTPUT
          echo "Final IMAGE_DIGEST found: $DIGEST"

  sign-image:
    runs-on: my-gke-runners
    needs: build-image
    permissions:
      contents: read
      id-token: write
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Beta Component
        run: gcloud components install beta --quiet

      - name: Sign and Create Attestation
        run: |
          gcloud beta container binauthz attestations sign-and-create \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --artifact-url="${{ secrets.ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/app-image@${{ needs.build-image.outputs.image_digest }}" \
            --attestor="my-attestor" \
            --attestor-project="${{ secrets.GCP_PROJECT_ID }}" \
            --keyversion-project="${{ secrets.GCP_PROJECT_ID }}" \
            --keyversion-location="global" \
            --keyversion-keyring="mytestring" \
            --keyversion-key="asymmetric-key" \
            --keyversion="1"

  update-gitops-repo:
    runs-on: my-gke-runners
    needs: [build-image, sign-image]
    steps:
      # 1. Checkout the SECOND repository (Your GitOps Repo)
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: 'rohan619/erricson_ibm_app_repo' # Change this to your Repo 2 name!
          token: ${{ secrets.GITOPS_PAT }}
          path: 'app-repo'

      # 2. Find and Replace the image digest, then commit and push!
      - name: Update Image Tag and Push
        run: |
          cd app-repo
          
          # The exact image string we built earlier
          NEW_IMAGE="${{ secrets.ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/app-image@${{ needs.build-image.outputs.image_digest }}"
          
          # Use sed to find the old image line and replace it with the new one
          sed -i "s|newTag: .*|newTag: ${{ needs.build-image.outputs.image_digest }}|g" base/kustomization.yaml
          
          git add base/kustomization.yaml
          
          # Configure Git and push the commit back to GitHub
          git config user.name "GitHub Actions Bot 🤖"
          git config user.email "actions@github.com"
          git add deployment.yaml
          git commit -m "Auto-update staging image to commit ${{ github.sha }}"
          git push origin main



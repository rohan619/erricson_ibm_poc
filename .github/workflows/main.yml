name: CI - Build And Cloud Deploy GitOps

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: my-gke-runners
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -q

  build-image:
    runs-on: my-gke-runners
    needs: test
    permissions:
      contents: read
      id-token: write
    outputs:
      image_repo: ${{ steps.meta.outputs.image_repo }}
      image_digest: ${{ steps.digest.outputs.image_digest }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - id: meta
        name: Build image metadata
        run: |
          IMAGE_REPO="${{ secrets.ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/app-image"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"

      - name: Start Cloud Build
        run: |
          BUILD_ID=$(gcloud builds submit \
            --async \
            --tag "${{ steps.meta.outputs.image_repo }}:${{ github.sha }}" \
            --format="value(id)")
          echo "BUILD_ID=${BUILD_ID}" >> "$GITHUB_ENV"

      - name: Wait for Cloud Build completion
        run: |
          STATUS="WORKING"
          while [[ "$STATUS" == "WORKING" || "$STATUS" == "QUEUED" ]]; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format="value(status)")
            echo "Cloud Build status: $STATUS"
            sleep 10
          done
          if [[ "$STATUS" != "SUCCESS" ]]; then
            echo "Build failed with status: $STATUS"
            exit 1
          fi

      - id: digest
        name: Resolve image digest
        run: |
          IMAGE_REF="${{ steps.meta.outputs.image_repo }}:${{ github.sha }}"
          DIGEST=$(gcloud artifacts docker images describe "$IMAGE_REF" --format="value(image_summary.digest)")
          if [[ -z "$DIGEST" ]]; then
            echo "Could not resolve image digest for $IMAGE_REF"
            exit 1
          fi
          echo "image_digest=$DIGEST" >> "$GITHUB_OUTPUT"

  sign-image:
    runs-on: my-gke-runners
    needs: build-image
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE_REPO: ${{ secrets.ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/app-image
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Beta Component
        run: gcloud components install beta --quiet

      - name: Sign and Create Attestation
        run: |
          if [[ -z "$IMAGE_REPO" ]]; then
            echo "IMAGE_REPO is empty; check ARTIFACT_REGION/GCP_PROJECT_ID/ARTIFACT_REPO secrets."
            exit 1
          fi
          gcloud beta container binauthz attestations sign-and-create \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --artifact-url="${IMAGE_REPO}@${{ needs.build-image.outputs.image_digest }}" \
            --attestor="my-attestor" \
            --attestor-project="${{ secrets.GCP_PROJECT_ID }}" \
            --keyversion-project="${{ secrets.GCP_PROJECT_ID }}" \
            --keyversion-location="global" \
            --keyversion-keyring="mytestring" \
            --keyversion-key="asymmetric-key" \
            --keyversion="1"

  cloud-deploy-gitops:
    runs-on: my-gke-runners
    needs: [build-image, sign-image]
    permissions:
      contents: read
      id-token: write
    env:
      CLOUD_DEPLOY_REGION: us-central1
      CLOUD_DEPLOY_PIPELINE: erricson-ibm-gitops-pipeline
      GITOPS_REPO: rohan619/erricson_ibm_app_repo
      GITOPS_BRANCH: main
      IMAGE_REPO: ${{ secrets.ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/app-image
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Apply Cloud Deploy resources
        run: |
          gcloud deploy apply \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region="$CLOUD_DEPLOY_REGION" \
            --file="clouddeploy/clouddeploy.yaml"

      - id: release
        name: Create Cloud Deploy release
        run: |
          RELEASE_NAME="rel-${GITHUB_SHA::12}-$(date +%m%d%H%M)"
          echo "RELEASE_NAME=$RELEASE_NAME" >> "$GITHUB_ENV"

          gcloud deploy releases create "$RELEASE_NAME" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region="$CLOUD_DEPLOY_REGION" \
            --delivery-pipeline="$CLOUD_DEPLOY_PIPELINE" \
            --source="." \
            --skaffold-file="clouddeploy/skaffold.yaml" \
            --deploy-parameters="customTarget/IMAGE_REPO=$IMAGE_REPO,customTarget/IMAGE_DIGEST=${{ needs.build-image.outputs.image_digest }},customTarget/GITOPS_REPO=$GITOPS_REPO,customTarget/GITOPS_BRANCH=$GITOPS_BRANCH,customTarget/GITOPS_PAT=${{ secrets.GITOPS_PAT }},customTarget/GITOPS_FILE_QA=overlays/staging/kustomization.yaml,customTarget/GITOPS_FILE_PROD=overlays/prod/kustomization.yaml"

      - name: Wait for QA rollout result
        run: |
          ATTEMPTS=0
          MAX_ATTEMPTS=45
          while true; do
            QA_ROLLOUT_PATH=$(gcloud deploy rollouts list \
              --project="${{ secrets.GCP_PROJECT_ID }}" \
              --region="$CLOUD_DEPLOY_REGION" \
              --delivery-pipeline="$CLOUD_DEPLOY_PIPELINE" \
              --release="$RELEASE_NAME" \
              --filter='targetId="gitops-qa"' \
              --sort-by='~createTime' \
              --limit=1 \
              --format='value(name)')

            if [[ -n "$QA_ROLLOUT_PATH" ]]; then
              QA_ROLLOUT="${QA_ROLLOUT_PATH##*/}"
              QA_STATUS=$(gcloud deploy rollouts describe "$QA_ROLLOUT" \
                --project="${{ secrets.GCP_PROJECT_ID }}" \
                --region="$CLOUD_DEPLOY_REGION" \
                --delivery-pipeline="$CLOUD_DEPLOY_PIPELINE" \
                --release="$RELEASE_NAME" \
                --format='value(state)')
              echo "QA rollout state: $QA_STATUS"

              if [[ "$QA_STATUS" == "SUCCEEDED" ]]; then
                break
              fi

              if [[ "$QA_STATUS" == "FAILED" || "$QA_STATUS" == "CANCELLED" ]]; then
                echo "QA rollout failed with state: $QA_STATUS"
                exit 1
              fi
            fi

            ATTEMPTS=$((ATTEMPTS + 1))
            if [[ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]]; then
              echo "Timed out waiting for QA rollout to complete."
              exit 1
            fi
            sleep 20
          done

      - name: Manual promotion note
        run: |
          echo "Release $RELEASE_NAME completed QA stage."
          echo "Promote manually when ready:"
          echo "gcloud deploy releases promote --project=${{ secrets.GCP_PROJECT_ID }} --region=$CLOUD_DEPLOY_REGION --delivery-pipeline=$CLOUD_DEPLOY_PIPELINE --release=$RELEASE_NAME"
          echo "After promotion, approve the prod rollout in Cloud Deploy (requireApproval=true)."

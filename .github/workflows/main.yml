name: CI - Tests, SonarQube, Fortify

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest -q

  sonar:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java (required by SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      - name: Install SonarScanner CLI
        run: |
          # ensure unzip and curl are available
          sudo apt-get update && sudo apt-get install -y unzip curl
          curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2856-linux.zip
          unzip -q sonar-scanner.zip -d $HOME/sonar-scanner
          # find the extracted scanner directory and add its bin to PATH
          SCANNER_DIR=$(find $HOME/sonar-scanner -maxdepth 1 -type d -name 'sonar-scanner-*' -print -quit)
          echo "$SCANNER_DIR/bin" >> $GITHUB_PATH
      - name: Run SonarScanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.login=$SONAR_TOKEN

  fortify:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Fortify
        run: |
          chmod +x ./fortify_scan.sh
      - name: Run Fortify SCA
        env:
          FORTIFY_SCA_IMAGE: ${{ secrets.FORTIFY_SCA_IMAGE }} # optional: docker image containing Fortify SCA
        run: |
          ./fortify_scan.sh

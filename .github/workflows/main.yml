name: CI - Tests, SonarQube, Fortify

on:
  push:
    branches:
      - main

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  sonar:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  fortify:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Fortify
        run: chmod +x ./fortify_scan.sh

      - name: Run Fortify
        env:
          FORTIFY_SCA_IMAGE: ${{ secrets.FORTIFY_SCA_IMAGE }}
        run: ./fortify_scan.sh

  build-image:
    runs-on: ubuntu-latest
    needs:
      - sonar
      - fortify

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set project
        run: gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      - name: Start Cloud Build
        run: |
          BUILD_ID=$(gcloud builds submit \
          --async \
          --tag ${{ secrets.ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/app-image:${{ github.sha }} \
          --format="value(id)")

          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV

      - name: Wait for build
        run: |
          STATUS="WORKING"

          while [[ "$STATUS" == "WORKING" || "$STATUS" == "QUEUED" ]]; do
            STATUS=$(gcloud builds describe $BUILD_ID --format="value(status)")
            echo "Build status: $STATUS"
            sleep 10
          done

          if [[ "$STATUS" != "SUCCESS" ]]; then
            echo "Cloud Build failed"
            exit 1
          fi
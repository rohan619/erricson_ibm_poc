apiVersion: skaffold/v4beta7
kind: Config
customActions:
  - name: gitops-render
    containers:
      - name: render
        image: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
        command: ["/bin/bash"]
        args:
          - "-c"
          - |-
            set -euo pipefail
            chmod +x ./scripts/clouddeploy_gitops_render.sh
            ./scripts/clouddeploy_gitops_render.sh

  - name: gitops-deploy
    containers:
      - name: deploy
        image: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
        command: ["/bin/bash"]
        args:
          - "-c"
          - |-
            set -euo pipefail
            chmod +x ./scripts/clouddeploy_gitops_deploy.sh
            ./scripts/clouddeploy_gitops_deploy.sh
